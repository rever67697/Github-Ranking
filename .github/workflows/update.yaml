  name: Daily Update GitHub Ranking

  on:
    schedule:
      - cron: '0 4 * * *'
    workflow_dispatch:

  permissions:
    contents: write

  jobs:
    update:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout repository
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.10'

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip wheel setuptools
            pip install numpy==1.23.5 pandas==1.5.3 requests

        - name: Create access_token.txt
          env:
            GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          run: echo -n "$GH_ACCESS_TOKEN" > access_token.txt

        - name: Pull latest changes
          run: git pull origin main

        - name: Run update script
          run: python source/process.py

        - name: Commit and push changes
          run: |
            git config --global user.name "GitHub Actions Bot"
            git config --global user.email "actions@github.com"

            if git diff --quiet; then
              echo "No changes to commit"
              exit 0
            fi

            git add .
            today=$(date +"%Y-%m-%d")
            git commit -m "auto update $today"
            git push origin main
            echo "Changes committed and pushed"
